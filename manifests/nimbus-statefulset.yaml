apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nimbus
  labels:
    app: nimbus
spec:
  serviceName: nimbus
  replicas: 1
  selector:
    matchLabels:
      app: nimbus
  template:
    metadata:
      labels:
        app: nimbus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8008"
    spec:
      terminationGracePeriodSeconds: 120
      initContainers:
        # Nimbus (UID 1000) requires 0700 on its data directory but cannot
        # chmod a root-owned hostpath PVC mount itself — do it as root first.
        - name: fix-permissions
          image: busybox:latest
          securityContext:
            runAsUser: 0
          command: ['sh', '-c', 'chmod 700 /data && chown 1000:1000 /data']
          volumeMounts:
            - name: cl-data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: 32Mi
        # trustedNodeSync is a one-shot subcommand that downloads a recent finalized
        # checkpoint state so the beacon node doesn't have to sync from genesis.
        # It exits 0 immediately if a finalized state already exists in /data,
        # so it is safe to run on every pod restart (idempotent).
        - name: checkpoint-sync
          image: statusim/nimbus-eth2:multiarch-latest
          command:
            - /home/user/nimbus_beacon_node
            - trustedNodeSync
            - --network=hoodi
            - --data-dir=/data
            - --trusted-node-url=https://beaconstate-hoodi.chainsafe.io
            - --backfill=false
          volumeMounts:
            - name: cl-data
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
        # Copy validator keystores from read-only secret mounts onto the writable
        # PVC in the layout Nimbus expects:
        #   keys/<0xpubkey>/keystore.json   (one subdir per validator)
        #   secrets/<0xpubkey>              (password file named by pubkey)
        # Pubkey is extracted from the keystore JSON via grep.
        # Idempotent: skips files that already exist.
        - name: setup-validator-keys
          image: busybox:latest
          securityContext:
            runAsUser: 1000
          command:
            - sh
            - -c
            - |
              mkdir -p /data/validators/secrets
              for ks in /keys-src/*.json; do
                [ -f "$ks" ] || continue
                PUBKEY=$(grep -o '"pubkey":"[^"]*"' "$ks" | cut -d'"' -f4)
                [ -z "$PUBKEY" ] && PUBKEY=$(grep -o '"pubkey": "[^"]*"' "$ks" | cut -d'"' -f4)
                [ -z "$PUBKEY" ] && continue
                [[ "$PUBKEY" == 0x* ]] || PUBKEY="0x$PUBKEY"
                mkdir -p "/data/validators/keys/$PUBKEY"
                [ -f "/data/validators/keys/$PUBKEY/keystore.json" ] || \
                  cp "$ks" "/data/validators/keys/$PUBKEY/keystore.json"
                PASSFILE="/pass-src/$PUBKEY"
                [ -f "$PASSFILE" ] && { \
                  [ -f "/data/validators/secrets/$PUBKEY" ] || \
                    cp "$PASSFILE" "/data/validators/secrets/$PUBKEY"; }
              done
          volumeMounts:
            - name: cl-data
              mountPath: /data
            - name: validator-keystores
              mountPath: /keys-src
              readOnly: true
            - name: validator-passwords
              mountPath: /pass-src
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: 32Mi
      containers:
        - name: nimbus
          image: statusim/nimbus-eth2:multiarch-latest
          args:
            - --network=hoodi
            - --data-dir=/data
            - --el=http://nethermind:8551
            - --jwt-secret=/jwt/jwt.hex
            - --rest
            - --rest-address=0.0.0.0
            - --rest-port=5052
            - --metrics
            - --metrics-address=0.0.0.0
            - --metrics-port=8008
            - --graffiti=hoodi-3cmd
            - --suggested-fee-recipient=YOUR_WITHDRAWAL_ADDRESS
            - --validators-dir=/data/validators/keys
            - --secrets-dir=/data/validators/secrets
          ports:
            - containerPort: 9000
              name: p2p-tcp
              protocol: TCP
            - containerPort: 9000
              name: p2p-udp
              protocol: UDP
            - containerPort: 5052
              name: beacon-api
            - containerPort: 8008
              name: metrics
          volumeMounts:
            - name: cl-data
              mountPath: /data
            - name: jwt-secret
              mountPath: /jwt
              readOnly: true
            # validator-keystores and validator-passwords are separate secrets so
            # Nimbus gets keystores at /validators/keys/<filename>.json and
            # passwords at /validators/secrets/<0xpubkey> (Nimbus naming convention).
            - name: validator-keystores
              mountPath: /validators/keys
              readOnly: true
            - name: validator-passwords
              mountPath: /validators/secrets
              readOnly: true
          resources:
            requests:
              cpu: "1"
              memory: 3Gi
            limits:
              cpu: "2"
              memory: 6Gi
          readinessProbe:
            httpGet:
              path: /eth/v1/node/health
              port: 5052
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /eth/v1/node/health
              port: 5052
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: jwt-secret
          secret:
            secretName: jwt-secret
        - name: validator-keystores
          secret:
            secretName: validator-keystores
            optional: true
        - name: validator-passwords
          secret:
            secretName: validator-passwords
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: cl-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: eth-storage
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nimbus
spec:
  selector:
    app: nimbus
  clusterIP: None
  ports:
    - name: beacon-api
      port: 5052
    - name: p2p-tcp
      port: 9000
      protocol: TCP
    - name: metrics
      port: 8008
