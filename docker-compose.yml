name: hoodi-validator
services:
  nethermind:
    image: nethermind/nethermind:latest
    container_name: nethermind
    restart: unless-stopped
    stop_grace_period: 5m
    command:
      - --config=hoodi
      - --datadir=/data
      - --JsonRpc.Enabled=true
      - --JsonRpc.Host=0.0.0.0
      - --JsonRpc.Port=8545
      - --JsonRpc.EngineHost=0.0.0.0
      - --JsonRpc.EnginePort=8551
      - --JsonRpc.JwtSecretFile=/jwt/jwt.hex
      - --Metrics.Enabled=true
      - --Metrics.ExposePort=6060
    ports:
      - "30303:30303/tcp"
      - "30303:30303/udp"
    volumes:
      - nethermind-data:/data
      - ./shared:/jwt:ro

  nimbus:
    image: statusim/nimbus-eth2:multiarch-latest
    container_name: nimbus
    restart: unless-stopped
    depends_on:
      - nethermind
    command:
      - --network=hoodi
      - --data-dir=/data
      - --el=http://nethermind:8551
      - --jwt-secret=/jwt/jwt.hex
      - --rest
      - --rest-address=0.0.0.0
      - --rest-port=5052
      - --metrics
      - --metrics-address=0.0.0.0
      - --trusted-node-url=https://beaconstate-hoodi.chainsafe.io
      - --suggested-fee-recipient=0xYOUR_ADDRESS
      - --graffiti=hoodi-3cmd
      - --validators-dir=/validators/keys
      - --secrets-dir=/validators/secrets
    ports:
      - "9000:9000/tcp"
      - "9000:9000/udp"
      - "127.0.0.1:5052:5052"
    volumes:
      - nimbus-data:/data
      - ./shared:/jwt:ro
      - ./validator-keys:/validators:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  nethermind-data:
  nimbus-data:
  prometheus-data:
  grafana-data:
